<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siren by Starbucks — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #F5F2ED;
    color: #1A1A1A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 80px;
    max-width: 1100px;
  }

  .info {
    flex: 1;
    max-width: 380px;
  }

  .app-icon {
    width: 96px;
    height: 96px;
    border-radius: 22px;
    margin-bottom: 32px;
  }

  .tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.35);
    margin-bottom: 16px;
  }

  .info h1 {
    font-size: 36px;
    font-weight: 700;
    color: #1A1A1A;
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .info h1 span { color: #00704A; }

  .info .desc {
    font-size: 16px;
    color: rgba(0,0,0,0.45);
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .info .hint {
    font-size: 12px;
    color: rgba(0,0,0,0.25);
  }

  .info .byline {
    font-size: 12px;
    color: rgba(0,0,0,0.35);
    margin-top: 8px;
  }

  .info .byline a {
    color: rgba(0,0,0,0.55);
    text-decoration: none;
  }

  .info .byline a:hover { text-decoration: underline; }

  /* iPhone frame — natural titanium */
  .phone-wrap { flex-shrink: 0; position: relative; }

  .phone-wrap::before {
    content: '';
    position: absolute;
    inset: -80px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.04), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .phone-frame {
    position: relative;
    z-index: 1;
    width: 393px;
    height: 808px;
    background: linear-gradient(160deg, #8E8E93, #636366 30%, #48484A 60%, #636366 90%, #8E8E93);
    border-radius: 52px;
    padding: 11px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.3),
      inset 0 -1px 0 rgba(0,0,0,0.15),
      0 2px 4px rgba(0,0,0,0.06),
      0 8px 20px rgba(0,0,0,0.1),
      0 40px 80px rgba(0,0,0,0.15);
  }

  /* Metallic edge highlight */
  .phone-frame > .bezel {
    position: absolute;
    inset: 0;
    border-radius: 52px;
    border: 1px solid rgba(255,255,255,0.12);
    pointer-events: none;
  }

  /* Power button */
  .phone-frame::before {
    content: '';
    position: absolute;
    right: -3px;
    top: 180px;
    width: 3px;
    height: 72px;
    background: linear-gradient(180deg, #8E8E93, #636366, #8E8E93);
    border-radius: 0 2px 2px 0;
  }

  /* Volume + silent */
  .phone-frame::after {
    content: '';
    position: absolute;
    left: -3px;
    top: 150px;
    width: 3px;
    height: 28px;
    background: linear-gradient(180deg, #8E8E93, #636366, #8E8E93);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 46px 0 #636366, 0 82px 0 #636366;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 42px;
    overflow: hidden;
    background: #000;
  }

  .phone-screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
  }

  @media (max-height: 950px) {
    .phone-frame { transform: scale(0.78); transform-origin: center center; }
    .container { gap: 48px; }
  }

  @media (max-height: 780px) {
    .phone-frame { transform: scale(0.65); transform-origin: center center; }
    .container { gap: 32px; }
  }

  @media (max-width: 900px) {
    .container { flex-direction: column; gap: 40px; }
    .info { text-align: center; max-width: 440px; }
  }

  @media (max-width: 480px) {
    .phone-wrap { display: none; }
    body { padding: 32px 20px; }
    .info h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="info">
    <img src="appicon.png" alt="Siren app icon" class="app-icon">
    <div class="tag">Interactive Prototype</div>
    <h1><span>Siren</span> by Starbucks</h1>
    <p class="desc">A dedicated app experience for the next generation of young bucks. Scroll and tap inside the device to explore.</p>
    <p class="byline">Concept &amp; prototype by <a href="https://mikemongeau.com" target="_blank">Mike Mongeau</a></p>
  </div>

  <div class="phone-wrap">
    <div class="phone-frame">
      <div class="bezel"></div>
      <div class="phone-screen">
        <iframe 
          src="https://starbucks-siren.manus.space" 
          title="Siren App Prototype"
          allow="clipboard-write"
          loading="eager"
        ></iframe>
      </div>
    </div>
  </div>
</div>

</body>
</html>
